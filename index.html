<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roof Yard Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:40px;
background:#111;
color:#ff4d2d;
font-size:2rem;
}

.container{
padding:20px;
}

/* CATEGORY CARDS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.cat{
background:#1a1a1a;
padding:10px;
border-radius:10px;
cursor:pointer;
text-align:center;
border:1px solid #333;
transition:0.2s;
}

.cat:hover{transform:scale(1.05);}

.cat img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

/* MENU ITEMS */
.item{
display:flex;
justify-content:space-between;
padding:10px;
background:#1a1a1a;
margin:8px 0;
border-radius:8px;
cursor:pointer;
}

.item:hover{background:#222;}

.price{color:#ff4d2d}

/* CART */
#cart{
background:#111;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.remove{
color:red;
cursor:pointer;
}

/* BACK BUTTON */
button{
background:#ff4d2d;
color:white;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
margin:5px 0;
}
</style>
</head>

<body>

<header>ROOF YARD MENU</header>

<div class="container">

<!-- MAIN MENU (CATEGORIES) -->
<div id="home">

<div class="grid">

<div class="cat" onclick="openCat('starters')">
<img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086">
<h3>Starters</h3>
</div>

<div class="cat" onclick="openCat('burgers')">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<h3>Burgers</h3>
</div>

<div class="cat" onclick="openCat('bbq')">
<img src="https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba">
<h3>BBQ</h3>
</div>

<div class="cat" onclick="openCat('karahi')">
<img src="https://images.unsplash.com/photo-1604908177522-040eeb0d9a9f">
<h3>Karahi</h3>
</div>

</div>

</div>

<!-- CATEGORY VIEW -->
<div id="menu" style="display:none;">

<button onclick="back()">⬅ Back</button>

<h2 id="title"></h2>

<div id="items"></div>

</div>

<!-- CART -->
<div id="cart">
<h2>🛒 Cart</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>

<button onclick="order()">Order on WhatsApp</button>
</div>

</div>

<script>

let cart=[];

const data={
starters:[
{name:"Honey Garlic Wings",price:520},
{name:"Pizza Fries",price:390},
{name:"Chicken Strips",price:399},
{name:"Cheese Fries",price:320}
],

burgers:[
{name:"Zinger Burger",price:499},
{name:"Beef Burger",price:420},
{name:"Stuffed Beef Burger",price:670}
],

bbq:[
{name:"Seekh Kabab",price:750},
{name:"Chicken Boti",price:670},
{name:"BBQ Platter",price:2600}
],

karahi:[
{name:"Chicken Karahi",price:1550},
{name:"Mutton Karahi",price:2100}
]
};

function openCat(cat){

document.getElementById("home").style.display="none";
document.getElementById("menu").style.display="block";

document.getElementById("title").innerText=cat.toUpperCase();

let html="";

data[cat].forEach((item,index)=>{
html+=`
<div class="item" onclick="add('${item.name}',${item.price})">
<span>${item.name}</span>
<span class="price">Rs ${item.price}</span>
</div>
`;
});

document.getElementById("items").innerHTML=html;
}

function back(){
document.getElementById("home").style.display="block";
document.getElementById("menu").style.display="none";
}

function add(name,price){
cart.push({name,price});
render();
}

function render(){
let html="";
let total=0;

cart.forEach((i,index)=>{
html+=`
<div>
${i.name} - Rs ${i.price}
<span class="remove" onclick="removeItem(${index})"> ❌</span>
</div>
`;
total+=i.price;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total: Rs "+total;
}

function removeItem(index){
cart.splice(index,1);
render();
}

function order(){
let msg="Order from Roof Yard:%0A";

cart.forEach(i=>{
msg+=i.name+" - Rs "+i.price+"%0A";
});

window.open("https://wa.me/923196639273?text="+msg);
}

</script>

</body>
</html>
