<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roof Yard Restaurant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Roof Yard Restaurant</h1>

  <div class="cart">
    🛒 Cart: <span id="cart-count">0</span>
    | Total: Rs <span id="cart-total">0</span>
  </div>
</header>

<section class="categories">

  <div class="category-card" onclick="showCategory('starters')">
    <img src="images/starters.jpg" alt="Starters">
    <h3>Starters</h3>
  </div>

  <div class="category-card" onclick="showCategory('desi')">
    <img src="images/desi.jpg" alt="Desi">
    <h3>Desi</h3>
  </div>

  <div class="category-card" onclick="showCategory('pasta')">
    <img src="images/pasta.jpg" alt="Pasta">
    <h3>Pasta & Sandwiches</h3>
  </div>

  <div class="category-card" onclick="showCategory('burgers')">
    <img src="images/burgers.jpg" alt="Burgers">
    <h3>Burgers</h3>
  </div>

  <div class="category-card" onclick="showCategory('chinese')">
    <img src="images/chinese.jpg" alt="Chinese">
    <h3>Chinese</h3>
  </div>

  <div class="category-card" onclick="showCategory('bbq')">
    <img src="images/bbq.jpg" alt="BBQ">
    <h3>BBQ</h3>
  </div>

  <div class="category-card" onclick="showCategory('rolls')">
    <img src="images/rolls.jpg" alt="Rolls">
    <h3>Rolls</h3>
  </div>

</section>

<section id="menu-container"></section>

<script src="script.js"></script>

</body>
</html>
